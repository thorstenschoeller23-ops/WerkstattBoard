<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WerkstattBoard · Mini-App Prototyp</title>
<!-- Google Fonts gemäß Design-Vorgabe: Archivo (Überschriften), Instrument Sans (Fließtext), JetBrains Mono (Technisches) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Instrument+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   WERKSTATTBOARD · DESIGN-TOKENS (exakt nach Spezifikation)
   ============================================================ */
:root{
  --grund:#FDFDFF;          /* Seitenhintergrund */
  --flaeche:#FFFFFF;        /* Karten / Flächen */
  --getoent:#F1F4FE;        /* getönte Flächen */
  --linie:#DFE4F2;          /* Linien / Rahmen */
  --text:#0B1020;           /* Primärtext */
  --text2:#3D4560;          /* Sekundärtext */
  --kobalt:#2B3FE4;         /* Primärfarbe */
  --violett:#7C3AED;        /* Verlaufsziel */
  --verlauf:linear-gradient(120deg,#2B3FE4,#7C3AED);
  --warn-fg:#E8401C; --warn-bg:#FFE9E2;      /* Koralle: Warnung/dringend */
  --arbeit-fg:#9A6A00; --arbeit-bg:#FFF3D6;  /* Bernstein: in Arbeit */
  --fertig-fg:#0B7A4F; --fertig-bg:#DCF5E9;  /* Grün: fertig */
  --radius:18px;
  --schatten:0 1px 2px rgba(11,16,32,.04), 0 8px 24px rgba(43,63,228,.07);
  --schatten-hoch:0 2px 4px rgba(11,16,32,.05), 0 16px 40px rgba(43,63,228,.12);
  --schrift-kopf:"Archivo",sans-serif;
  --schrift-text:"Instrument Sans",sans-serif;
  --schrift-mono:"JetBrains Mono",monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  background:var(--grund);
  color:var(--text);
  font-family:var(--schrift-text);
  font-size:15px;
  line-height:1.5;
  min-height:100vh;
}
h1,h2,h3,h4{font-family:var(--schrift-kopf);letter-spacing:-.01em}
.mono{font-family:var(--schrift-mono)}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}

/* ---------- Kopfleiste ---------- */
.kopf{
  position:sticky;top:0;z-index:50;
  background:rgba(253,253,255,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--linie);
}
.kopf-innen{
  max-width:1440px;margin:0 auto;padding:10px 20px;
  display:flex;align-items:center;gap:16px;flex-wrap:wrap;
}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{
  width:34px;height:34px;border-radius:10px;background:var(--verlauf);
  display:grid;place-items:center;color:#fff;font-family:var(--schrift-kopf);
  font-weight:800;font-size:15px;flex:none;
}
.logo b{font-family:var(--schrift-kopf);font-weight:800;font-size:17px}
.logo small{display:block;font-size:11px;color:var(--text2);font-weight:500;margin-top:-2px}
.demo-hinweis{
  font-size:11.5px;color:var(--text2);background:var(--getoent);
  border:1px solid var(--linie);border-radius:999px;padding:3px 10px;white-space:nowrap;
}
.uhr{
  margin-left:auto;font-family:var(--schrift-mono);font-weight:600;font-size:15px;
  background:var(--flaeche);border:1px solid var(--linie);border-radius:12px;padding:5px 12px;
}
.uhr small{color:var(--text2);font-weight:400;font-size:11px;margin-right:8px;font-family:var(--schrift-text)}
.icon-btn{
  width:38px;height:38px;border-radius:12px;border:1px solid var(--linie);
  background:var(--flaeche);color:var(--kobalt);font-family:var(--schrift-kopf);
  font-weight:800;font-size:17px;display:grid;place-items:center;flex:none;
  transition:all .15s ease;
}
.icon-btn:hover{border-color:var(--kobalt);box-shadow:var(--schatten);transform:translateY(-1px)}
.icon-btn.hilfe{background:var(--verlauf);color:#fff;border-color:transparent}

/* ---------- Rollen-Leiste ---------- */
.rollen{
  max-width:1440px;margin:0 auto;padding:10px 20px 12px;
  display:flex;gap:8px;flex-wrap:wrap;
}
.rolle-btn{
  border:1px solid var(--linie);background:var(--flaeche);color:var(--text2);
  border-radius:12px;padding:8px 14px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;transition:all .18s ease;
}
.rolle-btn small{display:block;font-weight:400;font-size:10.5px;opacity:.75}
.rolle-btn:hover{border-color:var(--kobalt);color:var(--kobalt)}
.rolle-btn.aktiv{
  background:var(--verlauf);border-color:transparent;color:#fff;box-shadow:var(--schatten-hoch);
}
.rolle-btn.aktiv small{opacity:.85}

/* ---------- Layout ---------- */
.buehne-bereich{max-width:1440px;margin:0 auto;padding:4px 20px 60px}
.spalten{display:grid;grid-template-columns:380px 1fr;gap:18px;align-items:start}
@media(max-width:980px){.spalten{grid-template-columns:1fr}}

/* ---------- Karten ---------- */
.karte{
  background:var(--flaeche);border:1px solid var(--linie);border-radius:var(--radius);
  box-shadow:var(--schatten);padding:16px;
  animation:gleiten .35s ease both;
}
@keyframes gleiten{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes puls{0%{box-shadow:0 0 0 0 rgba(43,63,228,.35)}100%{box-shadow:0 0 0 14px rgba(43,63,228,0)}}
.puls{animation:puls .9s ease-out 2}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.karte h3{font-size:14px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.karte h3 .zaehler{
  font-family:var(--schrift-mono);font-size:11px;font-weight:600;color:var(--kobalt);
  background:var(--getoent);border-radius:999px;padding:1px 8px;
}

/* ---------- Formulare ---------- */
.feld{margin-bottom:10px}
.feld label{display:block;font-size:11.5px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.feld input,.feld select,.feld textarea{
  width:100%;border:1px solid var(--linie);border-radius:10px;padding:8px 10px;
  background:var(--grund);outline:none;transition:border-color .15s;
}
.feld input:focus,.feld select:focus,.feld textarea:focus{border-color:var(--kobalt);box-shadow:0 0 0 3px rgba(43,63,228,.12)}
.feld-reihe{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{
  border:none;border-radius:12px;padding:9px 16px;font-size:13.5px;font-weight:600;
  transition:transform .12s ease, box-shadow .12s ease, opacity .12s;
}
.btn:active{transform:scale(.97)}
.btn-primaer{background:var(--verlauf);color:#fff;box-shadow:var(--schatten)}
.btn-primaer:hover{box-shadow:var(--schatten-hoch)}
.btn-sekundaer{background:var(--getoent);color:var(--kobalt);border:1px solid var(--linie)}
.btn-sekundaer:hover{border-color:var(--kobalt)}
.btn-geist{background:transparent;color:var(--text2);border:1px solid var(--linie)}
.btn-geist:hover{color:var(--warn-fg);border-color:var(--warn-fg)}
.btn-gruen{background:var(--fertig-bg);color:var(--fertig-fg);border:1px solid #b7e6cd}
.btn-klein{padding:5px 10px;font-size:12px;border-radius:9px}
.btn:disabled{opacity:.45;cursor:not-allowed}
.schalter{display:flex;gap:6px;margin-bottom:12px}
.schalter button{
  flex:1;border:1px solid var(--linie);background:var(--grund);border-radius:10px;
  padding:6px;font-size:12px;font-weight:600;color:var(--text2);
}
.schalter button.an{background:var(--getoent);color:var(--kobalt);border-color:var(--kobalt)}

/* ---------- Status-Chips ---------- */
.chip{
  display:inline-flex;align-items:center;gap:5px;border-radius:999px;
  padding:2px 10px;font-size:11.5px;font-weight:600;white-space:nowrap;
}
.chip::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}

/* ---------- Auftragsliste (Annahme) ---------- */
.auftrag-karte{
  border:1px solid var(--linie);border-radius:14px;padding:12px;margin-bottom:10px;
  background:var(--flaeche);transition:border-color .15s;
}
.auftrag-karte.warnung{border-color:var(--warn-fg);background:linear-gradient(0deg,rgba(255,233,226,.35),rgba(255,233,226,.35)),var(--flaeche)}
.auftrag-kopf{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.kennzeichen{
  font-family:var(--schrift-mono);font-weight:600;font-size:14px;
  background:var(--getoent);border:1px solid var(--linie);border-radius:7px;padding:1px 8px;
}
.auftrag-meta{font-size:12.5px;color:var(--text2);margin-top:4px}
.auftrag-aktionen{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.detail-zeile{font-size:12.5px;color:var(--text2);display:flex;gap:6px;align-items:baseline;margin-top:3px}
.detail-zeile b{color:var(--text);font-weight:600}
.zusage{font-family:var(--schrift-mono);font-size:12px}
.zusage.knapp{color:var(--arbeit-fg);font-weight:600}
.zusage.ueberfaellig{color:var(--warn-fg);font-weight:600}

/* ---------- Hallen-Anzeige ---------- */
.halle-kopf{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:16px;
}
.halle-kopf h2{font-size:26px;font-weight:800}
.kpi-leiste{display:flex;gap:10px;flex-wrap:wrap;margin-left:auto}
.kpi{
  background:var(--flaeche);border:1px solid var(--linie);border-radius:14px;
  padding:8px 16px;text-align:center;box-shadow:var(--schatten);
}
.kpi b{font-family:var(--schrift-mono);font-size:22px;font-weight:600;display:block;line-height:1.1}
.kpi span{font-size:10.5px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.halle-raster{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.buehnen-kachel{
  background:var(--flaeche);border:1px solid var(--linie);border-radius:var(--radius);
  box-shadow:var(--schatten);padding:18px;min-height:230px;display:flex;flex-direction:column;
  animation:gleiten .35s ease both;position:relative;overflow:hidden;
}
.buehnen-kachel::before{
  content:"";position:absolute;inset:0 0 auto 0;height:5px;background:var(--linie);
}
.buehnen-kachel.st-inArbeit::before{background:var(--arbeit-fg)}
.buehnen-kachel.st-warteTeile::before,.buehnen-kachel.st-warteFreigabe::before{background:var(--warn-fg)}
.buehnen-kachel.st-fertig::before{background:var(--fertig-fg)}
.buehnen-kachel.st-probefahrt::before{background:var(--kobalt)}
.buehnen-kachel.eskalation{
  border-color:var(--warn-fg);
  background:linear-gradient(0deg,rgba(255,233,226,.5),rgba(255,233,226,.5)),var(--flaeche);
}
.buehnen-kachel.eskalation::before{background:var(--warn-fg)}
.kachel-titel{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center}
.kachel-kennz{font-family:var(--schrift-mono);font-weight:600;font-size:30px;letter-spacing:-.01em;margin:8px 0 2px}
.kachel-fzg{font-size:15px;font-weight:600}
.kachel-art{font-size:13px;color:var(--text2)}
.kachel-fuss{margin-top:auto;padding-top:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.kachel-frei{
  margin:auto;text-align:center;color:var(--text2);font-size:14px;
}
.kachel-frei b{display:block;font-family:var(--schrift-kopf);font-size:18px;color:var(--fertig-fg);margin-bottom:2px}
.mechaniker-marke{
  width:28px;height:28px;border-radius:50%;background:var(--verlauf);color:#fff;
  display:inline-grid;place-items:center;font-family:var(--schrift-mono);font-size:11px;font-weight:600;
}
.teile-warnhinweis{
  display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;
  color:var(--warn-fg);background:var(--warn-bg);border-radius:999px;padding:2px 9px;
}
.warte-liste{margin-top:16px}
.warte-liste h3{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.warte-band{display:flex;gap:10px;flex-wrap:wrap}
.warte-eintrag{
  background:var(--getoent);border:1px solid var(--linie);border-radius:12px;padding:8px 12px;
  display:flex;align-items:center;gap:10px;font-size:13px;
}

/* ---------- Mechaniker-Ansicht ---------- */
.mech-wahl{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.mech-btn{
  display:flex;align-items:center;gap:8px;border:1px solid var(--linie);background:var(--flaeche);
  border-radius:12px;padding:7px 12px;font-size:13px;font-weight:600;color:var(--text2);
}
.mech-btn.aktiv{border-color:var(--kobalt);color:var(--kobalt);background:var(--getoent)}
.mech-raster{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:16px}
.checkliste{list-style:none;margin:10px 0}
.checkliste li{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:13.5px;border-bottom:1px dashed var(--linie)}
.checkliste li:last-child{border-bottom:none}
.checkliste input{width:17px;height:17px;accent-color:var(--kobalt);flex:none}
.checkliste li.erledigt span{color:var(--text2);text-decoration:line-through}
.fortschritt{height:7px;background:var(--getoent);border-radius:999px;overflow:hidden;margin:6px 0 2px}
.fortschritt i{display:block;height:100%;background:var(--verlauf);border-radius:999px;transition:width .3s ease}
.status-buttons{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}

/* ---------- Fotos ---------- */
.foto-bereich{margin-top:10px}
.foto-gruppe{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin:8px 0 5px}
.foto-band{display:flex;gap:8px;flex-wrap:wrap}
.foto-platzhalter{
  width:74px;height:56px;border-radius:9px;display:grid;place-items:center;color:#fff;
  font-size:9.5px;font-weight:600;text-align:center;line-height:1.25;padding:4px;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.25), var(--schatten);
}

/* ---------- Teile ---------- */
.teil-zeile{
  display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px dashed var(--linie);
  font-size:13px;flex-wrap:wrap;
}
.teil-zeile:last-child{border-bottom:none}
.teil-menge{font-family:var(--schrift-mono);font-size:12px;color:var(--text2)}
.teil-timer{font-family:var(--schrift-mono);font-size:11px;color:var(--text2)}
.teil-timer.spaet{color:var(--warn-fg);font-weight:600}

/* ---------- Benachrichtigungen & Log ---------- */
.nachricht{
  border:1px solid var(--linie);border-left:4px solid var(--kobalt);border-radius:12px;
  padding:10px 12px;margin-bottom:8px;font-size:13px;background:var(--grund);
}
.nachricht.offen{border-left-color:var(--arbeit-fg)}
.nachricht.gesendet{border-left-color:var(--fertig-fg)}
.sms-text{
  font-family:var(--schrift-mono);font-size:11.5px;background:var(--getoent);
  border-radius:8px;padding:8px;margin-top:6px;color:var(--text2);white-space:pre-wrap;
}
.log-liste{max-height:340px;overflow-y:auto;font-size:12px}
.log-eintrag{display:flex;gap:9px;padding:5px 0;border-bottom:1px dashed var(--linie)}
.log-zeit{font-family:var(--schrift-mono);font-size:11px;color:var(--text2);flex:none;padding-top:1px}
.log-person{font-weight:600;color:var(--kobalt)}

/* ---------- Auswertungen ---------- */
.stat-raster{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--getoent);border-radius:12px;padding:10px 12px}
.stat b{font-family:var(--schrift-mono);font-size:20px;font-weight:600;display:block}
.stat span{font-size:11px;color:var(--text2);font-weight:600}
.balken-zeile{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:12.5px}
.balken-zeile .name{width:110px;flex:none;color:var(--text2)}
.balken{flex:1;height:10px;background:var(--getoent);border-radius:999px;overflow:hidden}
.balken i{display:block;height:100%;background:var(--verlauf);border-radius:999px}
.balken-wert{font-family:var(--schrift-mono);font-size:11.5px;width:56px;text-align:right;flex:none}

/* ---------- Tabs (Annahme) ---------- */
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.tab{
  border:1px solid var(--linie);background:var(--flaeche);border-radius:999px;
  padding:6px 14px;font-size:12.5px;font-weight:600;color:var(--text2);position:relative;
}
.tab.aktiv{background:var(--verlauf);color:#fff;border-color:transparent}
.tab .punkt{
  position:absolute;top:-3px;right:-3px;width:10px;height:10px;border-radius:50%;
  background:var(--warn-fg);border:2px solid var(--grund);
}

/* ---------- Leere Zustände ---------- */
.leer{
  text-align:center;color:var(--text2);padding:26px 12px;font-size:13.5px;
  background:var(--getoent);border-radius:12px;border:1px dashed var(--linie);
}
.leer b{display:block;font-family:var(--schrift-kopf);font-size:15px;color:var(--text);margin-bottom:3px}

/* ---------- Modal ---------- */
.modal-fond{
  position:fixed;inset:0;background:rgba(11,16,32,.35);backdrop-filter:blur(3px);
  display:grid;place-items:center;z-index:100;padding:16px;
}
.modal{
  background:var(--flaeche);border-radius:var(--radius);box-shadow:var(--schatten-hoch);
  padding:20px;width:min(440px,100%);animation:gleiten .25s ease both;
}
.modal h3{font-size:16px;margin-bottom:12px}
.modal.gross{width:min(760px,100%);max-height:86vh;overflow-y:auto}
.modal-fuss{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.einst-abschnitt{border-top:1px solid var(--linie);padding-top:12px;margin-top:12px}
.einst-abschnitt h4{font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.einst-zeile{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.einst-zeile input{flex:1;border:1px solid var(--linie);border-radius:10px;padding:7px 10px;background:var(--grund);min-width:0}
details.einst-art{border:1px solid var(--linie);border-radius:12px;padding:8px 12px;margin-bottom:8px;background:var(--grund)}
details.einst-art summary{cursor:pointer;font-weight:600;font-size:13px}
details.einst-art textarea{width:100%;margin-top:8px;border:1px solid var(--linie);border-radius:10px;padding:8px;background:var(--flaeche);font-size:13px}
.hilfe-block{margin-bottom:14px}
.hilfe-block h4{font-size:13.5px;margin-bottom:4px}
.hilfe-block p,.hilfe-block li{font-size:13px;color:var(--text2)}
.hilfe-block ul{padding-left:18px;margin-top:4px}
.hilfe-block b{color:var(--text)}
kbd.platzhalter{font-family:var(--schrift-mono);font-size:11px;background:var(--getoent);border:1px solid var(--linie);border-radius:6px;padding:1px 5px}

/* ---------- Kleinkram ---------- */
.hinweis-klein{font-size:11.5px;color:var(--text2)}
.trenner{height:1px;background:var(--linie);margin:12px 0}
.leiste-oben{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.leiste-oben h2{font-size:20px;font-weight:800}
@media(max-width:640px){
  .kachel-kennz{font-size:24px}
  .halle-kopf h2{font-size:20px}
  .uhr{font-size:13px}
}
</style>
</head>
<body>

<!-- Kopfleiste mit Logo, Demo-Hinweis, Live-Uhr -->
<header class="kopf">
  <div class="kopf-innen">
    <div class="logo">
      <div class="logo-mark">WB</div>
      <div>
        <b>WerkstattBoard</b>
        <small id="wb-unter">Meisterbetrieb Demo · Kfz-Werkstatt</small>
      </div>
    </div>
    <span class="demo-hinweis">Demo-Modus – alle Daten sind Beispieldaten</span>
    <div class="uhr"><small id="uhr-datum"></small><span id="uhr-zeit">--:--:--</span></div>
    <button class="icon-btn" title="Einstellungen – alles selbst anpassen" aria-label="Einstellungen" onclick="modalEinstellungen()">⚙</button>
    <button class="icon-btn hilfe" title="Hilfe – so funktioniert das Board" aria-label="Hilfe" onclick="modalHilfe()">?</button>
  </div>
  <!-- Rollen-Leiste: simuliert die drei Geräte -->
  <nav class="rollen" id="rollen-leiste"></nav>
</header>

<main class="buehne-bereich" id="app"></main>
<div id="modal-wurzel"></div>

<script>
"use strict";
/* ============================================================
   WERKSTATTBOARD · Prototyp-Logik
   Alle Daten liegen ausschließlich im Arbeitsspeicher.
   Gemeinsamer State + zentrales Re-Render = Echtzeit-Gefühl
   über alle drei Ansichten hinweg.
   ============================================================ */

/* ---------- Hilfsfunktionen ---------- */
const $ = (sel, wurzel = document) => wurzel.querySelector(sel);
const MIN = 60 * 1000, STD = 60 * MIN, TAG = 24 * STD;
let idZaehler = 100;
const neueId = (p) => p + (idZaehler++);

function zeitHM(ts){ return new Date(ts).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"}); }
function zeitHMS(ts){ return new Date(ts).toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit",second:"2-digit"}); }
function datumLang(ts){ return new Date(ts).toLocaleDateString("de-DE",{weekday:"long",day:"2-digit",month:"long",year:"numeric"}); }
function dauerText(ms){
  if (ms < 0) ms = -ms;
  const std = Math.floor(ms / STD), min = Math.floor((ms % STD) / MIN);
  if (ms >= TAG) return Math.floor(ms / TAG) + " Tg " + (std % 24) + " Std";
  if (std > 0) return std + " Std " + String(min).padStart(2,"0") + " Min";
  return min + " Min";
}
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

  inArbeit:      { label:"In Arbeit",              fg:"#9A6A00", bg:"#FFF3D6" },
  warteTeile:    { label:"Warten auf Teile",       fg:"#E8401C", bg:"#FFE9E2" },
  warteFreigabe: { label:"Warten auf Freigabe",    fg:"#7C3AED", bg:"#F1E9FE" },
  probefahrt:    { label:"Probefahrt",             fg:"#2B3FE4", bg:"#E7EBFE" },
  fertig:        { label:"Fertig – abholbereit",   fg:"#0B7A4F", bg:"#DCF5E9" },
  abgeholt:      { label:"Abgeholt",               fg:"#3D4560", bg:"#EDEFF5" },

  storniert:     { label:"Storniert",              fg:"#3D4560", bg:"#EDEFF5" }

function chip(status){
  const s = STATUS[status];
  return '<span class="chip" style="color:' + s.fg + ';background:' + s.bg + '">' + s.label + '</span>';
}

function mechaniker(id){ return state.mechaniker.find(m => m.id === id) || null; }
function buehne(id){ return state.buehnen.find(b => b.id === id) || null; }
function auftrag(id){ return state.auftraege.find(a => a.id === id) || null; }
function auftragAufBuehne(buehneId){
  return state.auftraege.find(a => a.buehne === buehneId && !["abgeholt","storniert","geparkt"].includes(a.status)) || null;
}
function personAktuell(){

  if (state.rolle === "halle") return "Halle";
  return "Annahme";

/* ---------- Log & Benachrichtigung ---------- */
function loggen(text, person){
  state.log.unshift({ zeit:Date.now(), person: person || personAktuell(), text });
}
function smsText(a){
  const e = state.einstellungen;
  return e.smsVorlage
    .replaceAll("{name}", a.kunde.name || "Kundin/Kunde")
    .replaceAll("{kennzeichen}", a.kennzeichen)
    .replaceAll("{zeit}", zeitHM(Date.now()))
    .replaceAll("{werkstatt}", e.name) +
    " [Simulierte Nachricht – Wortlaut & Anrede unter ⚙ Einstellungen anpassbar]";
}
function benachrichtigungErzeugen(a){
  if (state.benachrichtigungen.some(n => n.auftragId === a.id && n.status === "offen")) return;
  state.benachrichtigungen.unshift({
    id:neueId("n"), auftragId:a.id, kanal:"SMS", text:smsText(a),
    status:"offen", versuche:0, zeit:Date.now()
  });
  loggen("Kunden-Info vorbereitet für " + a.kennzeichen + " (Status: fertig).", "System");
}

/* ============================================================
   AKTIONEN (verändern den State und rendern neu)
   ============================================================ */
function pulsSetzen(id){ state.puls = id; }

function statusSetzen(id, neu, vermerk){
  const a = auftrag(id); if (!a) return;
  const alt = a.status;
  if (alt === neu) return;

  // Teile-Sperre: solange ein Teil "bestellt" ist, kann der Auftrag nicht weiterlaufen
  const teileOffen = a.teile.some(t => t.status === "bestellt");
  if (alt === "warteTeile" && teileOffen && ["inArbeit","probefahrt","fertig"].includes(neu)){
    modalInfo("Auftrag blockiert", "Für " + escapeHtml(a.kennzeichen) + " ist noch mindestens ein Teil <b>bestellt, aber nicht eingetroffen</b>. Erst wenn die Annahme/Teiletheke den Eingang mit „da“ bestätigt, kann der Auftrag weiterlaufen.");
    return;
  }
  // Freigabe-Sperre: offene Zusatzarbeit muss erst entschieden werden
  if (a.zusatz && a.zusatz.status === "offen" && ["probefahrt","fertig"].includes(neu)){
    modalInfo("Freigabe ausstehend", "Die gemeldete Zusatzarbeit für " + escapeHtml(a.kennzeichen) + " wartet noch auf die Kundenfreigabe durch die Annahme.");
    return;
  }

  a.status = neu;
  if (neu === "fertig"){ a.zeiten.fertig = Date.now(); benachrichtigungErzeugen(a); }
  if (neu !== "fertig" && alt === "fertig"){ a.zeiten.fertig = null; }
  if (neu === "geparkt"){ a.buehne = null; }
  loggen("Status " + a.kennzeichen + ": „" + STATUS[alt].label + "“ → „" + STATUS[neu].label + "“" + (vermerk ? " · Vermerk: " + vermerk : ""));
  pulsSetzen(id);
  rendern();
}

function zuweisen(id, buehneId, mechId){
  const a = auftrag(id); if (!a) return;
  if (buehneId){
    const belegt = auftragAufBuehne(buehneId);
    if (belegt && belegt.id !== a.id){
      modalInfo("Bühne belegt", escapeHtml(buehne(buehneId).name) + " ist aktuell durch " + escapeHtml(belegt.kennzeichen) + " belegt.");
      return;
    }
  }
  a.buehne = buehneId || null;
  if (mechId) a.mechaniker = mechId;
  if (a.status === "geparkt" && buehneId) a.status = "wartet";
  loggen("Zuweisung " + a.kennzeichen + ": " + (buehneId ? buehne(buehneId).name : "Warteschlange") + (mechId ? " · " + mechaniker(mechId).name : ""));
  pulsSetzen(id);
  rendern();
}

function checklistePunkt(id, index){
  const a = auftrag(id); if (!a) return;
  const p = a.checkliste[index]; p.erledigt = !p.erledigt;
  loggen((p.erledigt ? "Erledigt" : "Wieder geöffnet") + " (" + a.kennzeichen + "): " + p.text);
  rendern();
}

function fotoHinzufuegen(id, typ){
  const a = auftrag(id); if (!a) return;
  const motive = typ === "vorher"
    ? ["Front","Heck","Seite links","Seite rechts","Innenraum","Tacho-Stand"]
    : ["Ausgetauschtes Teil","Reparaturstelle","Endzustand","Messwert"];
  a.fotos.push(neuesFoto(typ, motive[Math.floor(Math.random()*motive.length)]));
  loggen("Foto (" + typ + ") zu " + a.kennzeichen + " aufgenommen [simuliert].");
  pulsSetzen(id);
  rendern();
}

function teilAnfordern(id, name, menge){
  const a = auftrag(id); if (!a || !name.trim()) return;
  a.teile.push({ id:neueId("t"), name:name.trim(), menge:Math.max(1, parseInt(menge,10) || 1), status:"bestellt", bestelltAm:Date.now() });
  if (["wartet","inArbeit"].includes(a.status)) a.status = "warteTeile";
  loggen("Teil angefordert (" + a.kennzeichen + "): " + name.trim() + " ×" + (menge || 1) + " → Warnung an Annahme/Teiletheke.");
  pulsSetzen(id);
  rendern();
}

function teilEingang(auftragId, teilId){
  const a = auftrag(auftragId); if (!a) return;
  const t = a.teile.find(x => x.id === teilId); if (!t) return;
  t.status = "da";
  loggen("Teile-Eingang bestätigt (" + a.kennzeichen + "): " + t.name + " ist da.");
  if (a.status === "warteTeile" && !a.teile.some(x => x.status === "bestellt")){
    a.status = "inArbeit";
    loggen("Auftrag " + a.kennzeichen + " läuft weiter: alle Teile eingetroffen → „In Arbeit“.", "System");
  }
  pulsSetzen(auftragId);
  rendern();
}

function kundeBenachrichtigen(nId, erreicht){
  const n = state.benachrichtigungen.find(x => x.id === nId); if (!n) return;
  const a = auftrag(n.auftragId);
  n.versuche++;
  if (erreicht){
    n.status = "gesendet"; n.zeit = Date.now();
    loggen("SMS an " + a.kunde.name + " (" + a.kennzeichen + ") gesendet [simuliert].");
  } else {
    n.zeit = Date.now();
    loggen("Kunde " + a.kunde.name + " nicht erreicht (Versuch " + n.versuche + ") – Benachrichtigung bleibt offen, Fallback E-Mail möglich.");
  }
  rendern();
}
function fallbackEmail(nId){
  const n = state.benachrichtigungen.find(x => x.id === nId); if (!n) return;
  const a = auftrag(n.auftragId);
  n.status = "gesendet"; n.kanal = "E-Mail"; n.zeit = Date.now(); n.versuche++;
  loggen("Fallback: E-Mail an " + a.kunde.name + " (" + a.kennzeichen + ") gesendet [simuliert].");
  rendern();
}

function zusatzMelden(id, text, preis){
  const a = auftrag(id); if (!a || !text.trim()) return;
  a.zusatz = { text:text.trim(), preis:parseFloat(preis) || null, status:"offen" };
  a.status = "warteFreigabe";
  loggen("Zusatzarbeit gemeldet (" + a.kennzeichen + "): " + text.trim() + (preis ? " · ca. " + preis + " €" : "") + " → wartet auf Kundenfreigabe.");
  pulsSetzen(id);
  rendern();
}
function zusatzEntscheiden(id, freigegeben){
  const a = auftrag(id); if (!a || !a.zusatz) return;
  a.zusatz.status = freigegeben ? "freigegeben" : "abgelehnt";
  a.status = "inArbeit";
  loggen("Zusatzarbeit (" + a.kennzeichen + ") vom Kunden " + (freigegeben ? "freigegeben" : "abgelehnt") + " – Auftrag läuft weiter.");
  pulsSetzen(id);
  rendern();
}

function stornieren(id, grund){
  const a = auftrag(id); if (!a) return;
  a.status = "storniert"; a.buehne = null;
  loggen("Auftrag " + a.kennzeichen + " storniert. Grund: " + grund);
  rendern();
}

function auftragAnlegen(daten){
  const liste = state.einstellungen.auftragsarten[daten.auftragsart] || ["Arbeit durchführen"];
  const a = demoAuftrag(Object.assign({}, daten, {
    checkliste:liste.map(t => ({ text:t, erledigt:false })),
    zeiten:{ angenommen:Date.now(), fertig:null }
  }));
  // Laufkundschaft/Schnell-Anlage landet in der Warteschlange, nicht auf einer Bühne
  if (a.schnell) a.buehne = null;
  state.auftraege.unshift(a);
  loggen("Neuer Auftrag angelegt: " + a.kennzeichen + " · " + a.auftragsart + (a.schnell ? " (Schnell-Anlage, Rest später ergänzen)" : ""));
  if (a.fotos.length) loggen("Vorher-Foto bei Annahme aufgenommen (" + a.kennzeichen + ") [simuliert].");
  pulsSetzen(a.id);
  state.annahmeTab = "auftraege";
  rendern();
}

/* ============================================================
   TERMIN-AMPEL & KENNZAHLEN
   ============================================================ */
const AKTIV = ["wartet","inArbeit","warteTeile","warteFreigabe","probefahrt"];

function terminLage(a){
  // vergleicht Zusagezeit mit jetzt: ok | knapp (< 45 Min) | ueberfaellig
  if (!a.zusageZeit || !AKTIV.includes(a.status)) return "ok";
  const rest = a.zusageZeit - Date.now();
  if (rest < 0) return "ueberfaellig";
  if (rest < state.einstellungen.knappMinuten * MIN) return "knapp";
  return "ok";
}
function zusageHtml(a){
  if (!a.zusageZeit) return '<span class="hinweis-klein">keine Zusagezeit</span>';
  const lage = terminLage(a);
  const rest = a.zusageZeit - Date.now();
  let text = "Zusage " + zeitHM(a.zusageZeit);
  if (AKTIV.includes(a.status)) text += rest >= 0 ? " · noch " + dauerText(rest) : " · " + dauerText(rest) + " überfällig";
  return '<span class="zusage ' + lage + '" data-zusage="' + a.id + '">' + (lage !== "ok" ? "⚠ " : "") + text + '</span>';
}

function kennzahlen(){
  const belegt = state.buehnen.filter(b => auftragAufBuehne(b.id)).length;
  const heuteFertig = state.auftraege.filter(a => a.zeiten.fertig || a.status === "abgeholt").length;
  const heuteAngenommen = state.auftraege.filter(a => a.status !== "storniert").length;
  const offeneTeile = state.auftraege.flatMap(a => a.teile).filter(t => t.status === "bestellt").length;
  const blockiert = state.auftraege.filter(a => a.status === "warteTeile").length;
  const mitZusage = state.auftraege.filter(a => a.zusageZeit && (a.zeiten.fertig || a.status === "abgeholt"));
  const puenktlich = mitZusage.filter(a => (a.zeiten.fertig || 0) <= a.zusageZeit).length;
  return { belegt, heuteFertig, heuteAngenommen, offeneTeile, blockiert,
    termintreue: mitZusage.length ? Math.round(100 * puenktlich / mitZusage.length) : null };
}

function kuerzelAus(name){
  const teile = name.trim().split(/\s+/).filter(Boolean);
  if (!teile.length) return "??";
  const k = teile.length > 1 ? teile[0][0] + teile[teile.length-1][0] : teile[0].slice(0,2);
  return k.toUpperCase();
}

/* Aktuelle Eingaben aus dem offenen Einstellungs-Modal in den State übernehmen
   (damit beim Hinzufügen/Entfernen keine Eingaben verloren gehen). */
function einstellungenEinlesen(){
  const w = $("#modal-wurzel");
  if (!w.querySelector("#einst-name")) return;
  const e = state.einstellungen;
  e.name = $("#einst-name").value.trim() || e.name;
  e.untertitel = $("#einst-unter").value.trim();
  e.knappMinuten = Math.max(1, parseInt($("#einst-knapp").value, 10) || e.knappMinuten);
  e.teileWarnTage = Math.max(1, parseInt($("#einst-tage").value, 10) || e.teileWarnTage);
  e.smsVorlage = $("#einst-sms").value.trim() || e.smsVorlage;
  w.querySelectorAll("[data-buehne]").forEach(i => {
    const b = buehne(i.getAttribute("data-buehne"));
    if (b) b.name = i.value.trim() || b.name;
  });
  w.querySelectorAll("[data-mech]").forEach(i => {
    const m = mechaniker(i.getAttribute("data-mech"));
    if (m){ m.name = i.value.trim() || m.name; m.kuerzel = kuerzelAus(m.name); }
  });
  const neu = {};
  w.querySelectorAll("details.einst-art").forEach(d => {
    const name = d.querySelector(".art-name").value.trim();
    if (!name || neu[name]) return;
    const schritte = d.querySelector(".art-schritte").value.split("\n").map(s => s.trim()).filter(Boolean);
    neu[name] = schritte.length ? schritte : ["Arbeit durchführen"];
  });
  if (Object.keys(neu).length) e.auftragsarten = neu;
}
function einstellungenSpeichern(){
  einstellungenEinlesen();
  modalSchliessen();
  loggen("Einstellungen geändert (Betrieb, Warnschwellen, Vorlagen, Bühnen, Team, Auftragsarten).");
  rendern();
}
function buehneHinzufuegen(){
  einstellungenEinlesen();
  state.buehnen.push({ id:neueId("b"), name:"Bühne " + (state.buehnen.length + 1) });
  modalEinstellungen();
}
function buehneLoeschen(id){
  einstellungenEinlesen();
  if (state.buehnen.length <= 1){ modalInfo("Nicht möglich", "Mindestens eine Bühne muss bestehen bleiben."); return; }
  const belegtVon = auftragAufBuehne(id);
  if (belegtVon){ belegtVon.buehne = null; loggen(buehne(id).name + " entfernt – " + belegtVon.kennzeichen + " wandert in die Warteschlange.", "System"); }
  state.buehnen = state.buehnen.filter(b => b.id !== id);
  state.auftraege.forEach(a => { if (a.buehne === id) a.buehne = null; });
  modalEinstellungen();
}
function mechanikerHinzufuegen(){
  einstellungenEinlesen();
  const n = state.mechaniker.length + 1;
  state.mechaniker.push({ id:neueId("m"), name:"Mechaniker " + n, kuerzel:"M" + n });
  modalEinstellungen();
}
function mechanikerLoeschen(id){
  einstellungenEinlesen();
  if (state.mechaniker.length <= 1){ modalInfo("Nicht möglich", "Mindestens ein Mechaniker muss bestehen bleiben."); return; }
  state.auftraege.forEach(a => { if (a.mechaniker === id) a.mechaniker = null; });
  state.mechaniker = state.mechaniker.filter(m => m.id !== id);
  if (state.aktiverMechaniker === id) state.aktiverMechaniker = state.mechaniker[0].id;
  modalEinstellungen();
}
function artHinzufuegen(){
  einstellungenEinlesen();
  let name = "Neue Auftragsart", n = 2;
  while (state.einstellungen.auftragsarten[name]) name = "Neue Auftragsart " + (n++);
  state.einstellungen.auftragsarten[name] = ["Arbeit durchführen", "Funktionstest"];
  modalEinstellungen();
}
function artLoeschen(btn){
  const d = btn.closest("details.einst-art");
  const name = d.querySelector(".art-name").value.trim();
  einstellungenEinlesen();
  if (Object.keys(state.einstellungen.auftragsarten).length <= 1){
    modalInfo("Nicht möglich", "Mindestens eine Auftragsart muss bestehen bleiben."); return;
  }
  delete state.einstellungen.auftragsarten[name];
  modalEinstellungen();
}

function fotosHtml(a, mitAufnahme, typFuerAufnahme){
  const gruppen = ["vorher","nachher"].map(typ => {
    const bilder = a.fotos.filter(f => f.typ === typ);
    if (!bilder.length && !(mitAufnahme && typ === typFuerAufnahme)) return "";
    return '<div class="foto-gruppe">' + (typ === "vorher" ? "Vorher (Annahme)" : "Nachher (Arbeit)") + '</div>' +
      '<div class="foto-band">' +
      bilder.map(f => '<div class="foto-platzhalter" style="background:' + f.farbe + '" title="' + zeitHM(f.zeit) + '">' + escapeHtml(f.motiv) + '<br>' + zeitHM(f.zeit) + '</div>').join("") +
      (mitAufnahme && typ === typFuerAufnahme
        ? '<button class="btn btn-sekundaer btn-klein" style="height:56px" onclick="fotoHinzufuegen(\'' + a.id + '\',\'' + typ + '\')">＋ Foto</button>' : "") +
      '</div>';
  }).join("");
  return gruppen ? '<div class="foto-bereich">' + gruppen + '</div>' : "";
}

function teileHtml(a, darfBestaetigen){
  if (!a.teile.length) return "";
  return '<div class="trenner"></div><div class="foto-gruppe">Teile</div>' + a.teile.map(t => {
    const wartezeit = Date.now() - t.bestelltAm;
    const spaet = t.status === "bestellt" && wartezeit > state.einstellungen.teileWarnTage * TAG; // Frist unter Einstellungen anpassbar
    return '<div class="teil-zeile">' +
      '<span class="teil-menge">' + t.menge + '×</span><b style="font-weight:600">' + escapeHtml(t.name) + '</b>' +
      (t.status === "da"
        ? '<span class="chip" style="color:var(--fertig-fg);background:var(--fertig-bg)">da</span>'
        : '<span class="chip" style="color:var(--warn-fg);background:var(--warn-bg)">bestellt</span>' +
          '<span class="teil-timer' + (spaet ? " spaet" : "") + '">seit ' + dauerText(wartezeit) + (spaet ? " · WARNUNG" : "") + '</span>' +

      return '<option value="' + x.id + '"' + (a.buehne === x.id ? " selected" : "") + (frei ? "" : " disabled") + '>' + x.name + (frei ? "" : " (belegt)") + '</option>';
    }).join("");
  const mechOptionen = '<option value="">– Mechaniker –</option>' +
    state.mechaniker.map(x => '<option value="' + x.id + '"' + (a.mechaniker === x.id ? " selected" : "") + '>' + x.name + '</option>').join("");
  const statusOptionen = Object.keys(STATUS).filter(s => s !== "storniert")
    .map(s => '<option value="' + s + '"' + (a.status === s ? " selected" : "") + '>' + STATUS[s].label + '</option>').join("");

  return '<div class="auftrag-karte' + (lage !== "ok" ? " warnung" : "") + '" data-auftrag="' + a.id + '">' +
    '<div class="auftrag-kopf"><span class="kennzeichen">' + escapeHtml(a.kennzeichen) + '</span>' +

    (a.schnell ? '<span class="chip" style="color:var(--kobalt);background:var(--getoent)">Schnell-Anlage · später ergänzen</span>' : "") +
    (a.gewaehrleistung ? '<span class="chip" style="color:var(--violett);background:#F1E9FE">Gewährleistung ↔ ' + escapeHtml(a.gewaehrleistung) + '</span>' : "") +
    '</div>' +
    '<div class="auftrag-meta">' + escapeHtml(a.auftragsart) + ' · ' + escapeHtml(a.kunde.name || "Kunde folgt") +
      (a.kunde.telefon ? ' · <span class="mono" style="font-size:12px">' + escapeHtml(a.kunde.telefon) + '</span>' : ' · <span style="color:var(--warn-fg)">Handynummer fehlt</span>') + '</div>' +
    '<div class="detail-zeile">' + zusageHtml(a) +
      (a.kostenvoranschlag != null ? '<span class="mono" style="font-size:12px">· KV ' + a.kostenvoranschlag.toFixed(0) + ' €</span>' : "") +
      (b ? '<span>· ' + b.name + '</span>' : '<span>· Warteschlange</span>') +
      (m ? '<span>· ' + escapeHtml(m.name) + '</span>' : "") +
      (a.standort ? '<span>· Standort: ' + escapeHtml(a.standort) + '</span>' : "") + '</div>' +
    (a.notiz ? '<div class="detail-zeile">Notiz: ' + escapeHtml(a.notiz) + '</div>' : "") +
    (a.zusatz ? '<div class="detail-zeile"><b>Zusatzarbeit:</b> ' + escapeHtml(a.zusatz.text) +
      (a.zusatz.preis ? ' (ca. ' + a.zusatz.preis + ' €)' : "") + ' · ' + a.zusatz.status +
      (a.zusatz.status === "offen"
        ? ' <button class="btn btn-gruen btn-klein" onclick="zusatzEntscheiden(\'' + a.id + '\',true)">Freigabe erteilen</button>' +
          ' <button class="btn btn-geist btn-klein" onclick="zusatzEntscheiden(\'' + a.id + '\',false)">Ablehnen</button>' : "") + '</div>' : "") +
    fotosHtml(a, false) + teileHtml(a, true) +
    (["abgeholt"].includes(a.status) ? "" :
    '<div class="auftrag-aktionen">' +
      '<select class="btn btn-klein" style="border:1px solid var(--linie);background:var(--grund)" onchange="zuweisen(\'' + a.id + '\',this.value,null)" title="Bühne zuweisen">' + buehnenOptionen + '</select>' +
      '<select class="btn btn-klein" style="border:1px solid var(--linie);background:var(--grund)" onchange="if(this.value)zuweisen(\'' + a.id + '\',\'' + (a.buehne || "") + '\',this.value)" title="Mechaniker zuweisen">' + mechOptionen + '</select>' +
      '<select class="btn btn-klein" style="border:1px solid var(--linie);background:var(--grund)" onchange="statusSetzen(\'' + a.id + '\',this.value,\'manuell (Annahme) gesetzt/zurückgesetzt\')" title="Status setzen/zurücksetzen (Fehlbedienung korrigierbar)">' + statusOptionen + '</select>' +
      '<button class="btn btn-sekundaer btn-klein" onclick="modalBearbeiten(\'' + a.id + '\')">Ergänzen / Ändern</button>' +
      (offeneInfo ? '<button class="btn btn-primaer btn-klein" onclick="modalSms(\'' + offeneInfo.id + '\')">Kunde benachrichtigen</button>' : "") +
      (a.status === "fertig" ? '<button class="btn btn-gruen btn-klein" onclick="statusSetzen(\'' + a.id + '\',\'abgeholt\')">Abgeholt ✓</button>' : "") +

  '</div>';

function neuAbschicken(){
  const kennz = $("#neu-kennz").value.trim().toUpperCase();
  const fehler = $("#neu-fehler");
  if (!kennz){ fehler.textContent = "Bitte mindestens das Kennzeichen angeben."; return; }
  const foto = $("#neu-foto").checked;
  if (state.schnellAnlage){
    const problem = $("#neu-problem").value.trim();
    if (!problem){ fehler.textContent = "Bitte das Problem kurz beschreiben."; return; }
    auftragAnlegen({ kennzeichen:kennz, marke:"", modell:"", kunde:{name:"", telefon:""},
      auftragsart:$("#neu-art").value, schnell:true, notiz:"Laufkundschaft: " + problem,
      fotos: foto ? [neuesFoto("vorher","Zustand bei Annahme")] : [] });
    return;
  }
  const marke = $("#neu-marke").value.trim(), kunde = $("#neu-kunde").value.trim();
  if (!marke || !kunde){ fehler.textContent = "Bitte Marke und Kunde ausfüllen (oder Schnell-Anlage nutzen)."; return; }
  let zusage = null;
  if ($("#neu-zusage").value){ const d = new Date(); const [h,m] = $("#neu-zusage").value.split(":"); d.setHours(+h,+m,0,0); zusage = d.getTime(); }
  auftragAnlegen({
    kennzeichen:kennz, marke, modell:$("#neu-modell").value.trim(),
    kunde:{ name:kunde, telefon:$("#neu-tel").value.trim() },
    auftragsart:$("#neu-art").value,
    buehne:$("#neu-buehne").value || null, mechaniker:$("#neu-mech").value || null,
    zusageZeit:zusage, kostenvoranschlag:$("#neu-kv").value ? parseFloat($("#neu-kv").value) : null,
    fotos: foto ? [neuesFoto("vorher","Zustand bei Annahme")] : []
  });
}

function tabAuswertung(){
  const k = kennzahlen();
  // Durchlaufzeit je Auftragsart (aus fertigen/abgeholten Demo-Daten)
  const arten = {};
  state.auftraege.filter(a => a.zeiten.fertig).forEach(a => {
    (arten[a.auftragsart] = arten[a.auftragsart] || []).push(a.zeiten.fertig - a.zeiten.angenommen);
  });
  const artZeilen = Object.entries(arten).map(([art, werte]) => {
    const mittel = werte.reduce((s,x) => s+x, 0) / werte.length;
    return { art, mittel };
  });
  const maxMittel = Math.max(1, ...artZeilen.map(z => z.mittel));
  return '<div class="karte" style="animation:none"><h3>Auswertung für die Leitung <span class="zaehler">live aus Demo-Daten</span></h3>' +
    '<div class="stat-raster">' +
      '<div class="stat"><b>' + k.heuteAngenommen + ' / ' + k.heuteFertig + '</b><span>heute angenommen / fertig</span></div>' +
      '<div class="stat"><b>' + k.belegt + ' / ' + state.buehnen.length + '</b><span>Bühnen belegt</span></div>' +
      '<div class="stat"><b>' + (k.termintreue == null ? "–" : k.termintreue + " %") + '</b><span>Termintreue (pünktlich fertig)</span></div>' +
      '<div class="stat"><b>' + k.offeneTeile + '</b><span>offene Teile-Bestellungen</span></div>' +
      '<div class="stat"><b>' + k.blockiert + '</b><span>dadurch blockierte Aufträge</span></div>' +
    '</div>' +
    '<div class="foto-gruppe">Ø Durchlaufzeit je Auftragsart</div>' +
    (artZeilen.length ? artZeilen.map(z =>
      '<div class="balken-zeile"><span class="name">' + escapeHtml(z.art) + '</span><div class="balken"><i style="width:' + Math.round(100*z.mittel/maxMittel) + '%"></i></div><span class="balken-wert">' + dauerText(z.mittel) + '</span></div>'
    ).join("") : '<p class="hinweis-klein">Noch keine fertigen Aufträge heute.</p>') +
    '<div class="foto-gruppe" style="margin-top:14px">Bühnen-Auslastung jetzt</div>' +
    state.buehnen.map(b => {
      const belegtVon = auftragAufBuehne(b.id);

    }).join("") +

  const fertigOhneBuehne = state.auftraege.filter(a => a.status === "fertig");
  const geparkt = state.auftraege.filter(a => a.status === "geparkt");

  return '<div class="halle-kopf"><h2>Halle · Live-Anzeige</h2>' +

      '<div class="kpi"><b>' + warteschlange.length + '</b><span>in Warteschlange</span></div>' +
      '<div class="kpi" ' + (k.offeneTeile ? 'style="border-color:var(--warn-fg)"' : "") + '><b style="' + (k.offeneTeile ? "color:var(--warn-fg)" : "") + '">' + k.offeneTeile + '</b><span>Teile offen</span></div>' +
    '</div></div>' +
    '<div class="halle-raster">' + state.buehnen.map(b => buehnenKachel(b)).join("") + '</div>' +
    '<div class="warte-liste"><h3>Warteschlange & abholbereit</h3><div class="warte-band">' +
      (warteschlange.length || fertigOhneBuehne.length || geparkt.length
        ? warteschlange.map(a =>
            '<div class="warte-eintrag" data-auftrag="' + a.id + '"><span class="kennzeichen">' + escapeHtml(a.kennzeichen) + '</span>' +
            '<span>' + escapeHtml((a.marke + " " + a.modell).trim() || a.auftragsart) + '</span>' + chip(a.status) + zusageHtml(a) + '</div>').join("") +
          fertigOhneBuehne.map(a =>
            '<div class="warte-eintrag" style="border-color:#b7e6cd;background:var(--fertig-bg)" data-auftrag="' + a.id + '"><span class="kennzeichen">' + escapeHtml(a.kennzeichen) + '</span><span>' + escapeHtml(a.kunde.name) + '</span>' + chip("fertig") + '</div>').join("") +
          geparkt.map(a =>
            '<div class="warte-eintrag" data-auftrag="' + a.id + '"><span class="kennzeichen">' + escapeHtml(a.kennzeichen) + '</span>' + chip("geparkt") + '<span class="hinweis-klein">' + escapeHtml(a.standort || "") + '</span></div>').join("")
        : '<div class="leer" style="flex:1"><b>Warteschlange leer – alles auf den Bühnen! ✔</b></div>') +
    '</div></div>';
}

function buehnenKachel(b){
  const a = auftragAufBuehne(b.id);
  if (!a){
    return '<div class="buehnen-kachel"><div class="kachel-titel">' + b.name + '</div>' +
      '<div class="kachel-frei"><b>Frei</b>Nächstes Fahrzeug aus der Warteschlange zuweisen (Annahme).</div></div>';
  }
  const lage = terminLage(a);
  const m = mechaniker(a.mechaniker);
  const teileOffen = a.teile.filter(t => t.status === "bestellt");
  const naechster = { wartet:"inArbeit", inArbeit:"probefahrt", probefahrt:"fertig" }[a.status];
  return '<div class="buehnen-kachel st-' + a.status + (lage !== "ok" ? " eskalation" : "") + '" data-auftrag="' + a.id + '">' +
    '<div class="kachel-titel"><span>' + b.name + '</span>' + (m ? '<span class="mechaniker-marke" title="' + escapeHtml(m.name) + '">' + m.kuerzel + '</span>' : "") + '</div>' +
    '<div class="kachel-kennz">' + escapeHtml(a.kennzeichen) + '</div>' +
    '<div class="kachel-fzg">' + escapeHtml((a.marke + " " + a.modell).trim()) + '</div>' +
    '<div class="kachel-art">' + escapeHtml(a.auftragsart) + '</div>' +
    '<div style="margin-top:8px">' + zusageHtml(a) + '</div>' +
    (teileOffen.length ? '<div style="margin-top:6px"><span class="teile-warnhinweis">⚠ ' + teileOffen.length + ' Teil(e) bestellt – blockiert</span></div>' : "") +
    (a.zusatz && a.zusatz.status === "offen" ? '<div style="margin-top:6px"><span class="teile-warnhinweis" style="color:var(--violett);background:#F1E9FE">Freigabe des Kunden ausstehend</span></div>' : "") +
    '<div class="kachel-fuss">' + chip(a.status) +
      (naechster ? '<button class="btn btn-sekundaer btn-klein" style="margin-left:auto" onclick="statusSetzen(\'' + a.id + '\',\'' + naechster + '\')" title="Mechaniker tippt seinen Status weiter">Weiter: ' + STATUS[naechster].label + ' →</button>' : "") +
    '</div></div>';
}

/* ============================================================
   ANSICHT C · MECHANIKER (Smartphone / Tablet am Arbeitsplatz)
   ============================================================ */
function ansichtMechaniker(){
  const ich = mechaniker(state.aktiverMechaniker);
  const meine = state.auftraege.filter(a => a.mechaniker === ich.id && AKTIV.concat("fertig").includes(a.status));
  return '<div class="leiste-oben"><h2>Mechaniker · Arbeitsplatz</h2>' +
    '<span class="hinweis-klein">Rolle „Mechaniker“: pflegt Status, Checkliste, Fotos, fordert Teile an – sieht keine Preise, storniert nicht.</span></div>' +
    '<div class="mech-wahl">' + state.mechaniker.map(m =>
      '<button class="mech-btn' + (m.id === state.aktiverMechaniker ? " aktiv" : "") + '" onclick="state.aktiverMechaniker=\'' + m.id + '\';rendern()">' +
      '<span class="mechaniker-marke">' + m.kuerzel + '</span>' + escapeHtml(m.name) + '</button>').join("") + '</div>' +
    (meine.length
      ? '<div class="mech-raster">' + meine.map(a => mechanikerKarte(a)).join("") + '</div>'
      : '<div class="leer"><b>Nichts offen – alles erledigt! ✔</b>Neue Zuweisungen erscheinen hier sofort, sobald die Annahme sie vergibt.</div>');
}

function mechanikerKarte(a){
  const lage = terminLage(a);
  const b = buehne(a.buehne);
  const erledigt = a.checkliste.filter(p => p.erledigt).length;
  const prozent = Math.round(100 * erledigt / a.checkliste.length);
  const teileOffen = a.teile.some(t => t.status === "bestellt");
  const statusWahl = [
    { s:"inArbeit",   txt:"In Arbeit" },
    { s:"warteTeile", txt:"Warten auf Teile" },
    { s:"probefahrt", txt:"Probefahrt" },
    { s:"fertig",     txt:"Fertig – abholbereit" }
  ];
  return '<div class="karte' + (lage !== "ok" ? " warnung" : "") + '" data-auftrag="' + a.id + '" style="' + (lage !== "ok" ? "border-color:var(--warn-fg)" : "") + '">' +
    '<div class="auftrag-kopf"><span class="kennzeichen">' + escapeHtml(a.kennzeichen) + '</span><b>' + escapeHtml((a.marke + " " + a.modell).trim()) + '</b>' + chip(a.status) + '</div>' +
    '<div class="auftrag-meta">' + escapeHtml(a.auftragsart) + (b ? ' · ' + b.name : ' · Warteschlange') + '</div>' +
    '<div class="detail-zeile">' + zusageHtml(a) + '</div>' +
    (a.notiz ? '<div class="detail-zeile">Notiz: ' + escapeHtml(a.notiz) + '</div>' : "") +
    (a.zusatz ? '<div class="detail-zeile"><b>Zusatzarbeit:</b> ' + escapeHtml(a.zusatz.text) + ' · ' + a.zusatz.status + '</div>' : "") +
    '<div class="fortschritt"><i style="width:' + prozent + '%"></i></div>' +
    '<span class="hinweis-klein mono">' + erledigt + '/' + a.checkliste.length + ' Arbeitsschritte</span>' +
    '<ul class="checkliste">' + a.checkliste.map((p,i) =>
      '<li class="' + (p.erledigt ? "erledigt" : "") + '"><input type="checkbox" id="chk-' + a.id + '-' + i + '" ' + (p.erledigt ? "checked" : "") + ' onchange="checklistePunkt(\'' + a.id + '\',' + i + ')"><label for="chk-' + a.id + '-' + i + '" style="cursor:pointer"><span>' + escapeHtml(p.text) + '</span></label></li>').join("") + '</ul>' +
    fotosHtml(a, a.status !== "fertig", "nachher") +
    teileHtml(a, false) +
    (teileOffen ? '<p class="hinweis-klein" style="color:var(--warn-fg);margin-top:4px">⚠ Blockiert, bis die Annahme den Teile-Eingang bestätigt.</p>' : "") +
    (a.status === "fertig" ? "" :
      '<div class="trenner"></div>' +
      '<div class="feld-reihe" style="grid-template-columns:1fr 64px">' +
        '<input id="teil-name-' + a.id + '" placeholder="Ersatzteil anfordern…" style="border:1px solid var(--linie);border-radius:10px;padding:7px 10px;background:var(--grund)">' +
        '<input id="teil-menge-' + a.id + '" type="number" value="1" min="1" style="border:1px solid var(--linie);border-radius:10px;padding:7px;background:var(--grund)">' +
      '</div>' +
      '<div class="status-buttons">' +
        '<button class="btn btn-sekundaer btn-klein" onclick="teilAnfordern(\'' + a.id + '\',$(\'#teil-name-' + a.id + '\').value,$(\'#teil-menge-' + a.id + '\').value)">Teil anfordern</button>' +
        '<button class="btn btn-sekundaer btn-klein" onclick="modalZusatz(\'' + a.id + '\')">Zusatzarbeit melden</button>' +
      '</div>' +
      '<div class="status-buttons">' + statusWahl.map(x =>
        '<button class="btn btn-klein ' + (a.status === x.s ? "btn-primaer" : "btn-geist") + '" style="' + (a.status === x.s ? "" : "color:var(--text2)") + '" onclick="statusSetzen(\'' + a.id + '\',\'' + x.s + '\')">' + x.txt + '</button>').join("") + '</div>') +
  '</div>';
}

/* ============================================================
   ZENTRALES RENDERN + LIVE-UHR / TICK
   ============================================================ */
function rendern(){
  const e = state.einstellungen;
  $("#wb-unter").textContent = e.name + (e.untertitel ? " · " + e.untertitel : "");
  rollenLeiste();
  const app = $("#app");
  if (state.rolle === "annahme") app.innerHTML = ansichtAnnahme();
  else if (state.rolle === "halle") app.innerHTML = ansichtHalle();
  else app.innerHTML = ansichtMechaniker();

  // Geändertes Element kurz pulsieren lassen
  if (state.puls){
    const ziel = app.querySelector('[data-auftrag="' + state.puls + '"]');
    if (ziel) ziel.classList.add("puls");
    state.puls = null;
  }
}

/* Live-Uhr + Termin-Ampel: Countdown-Texte jede Sekunde aktualisieren,
   ohne die ganze Ansicht neu zu bauen (Eingaben bleiben erhalten). */
function tick(){
  const jetzt = Date.now();
  $("#uhr-zeit").textContent = zeitHMS(jetzt);
  $("#uhr-datum").textContent = datumLang(jetzt);
  document.querySelectorAll("[data-zusage]").forEach(el => {
    const a = auftrag(el.getAttribute("data-zusage"));
    if (!a || !a.zusageZeit) return;
    const lage = terminLage(a);
    const rest = a.zusageZeit - jetzt;
    let text = "Zusage " + zeitHM(a.zusageZeit);
    if (AKTIV.includes(a.status)) text += rest >= 0 ? " · noch " + dauerText(rest) : " · " + dauerText(rest) + " überfällig";
    el.textContent = (lage !== "ok" ? "⚠ " : "") + text;
    el.className = "zusage " + lage;
    // Farb-Eskalation der zugehörigen Kachel/Karte
    const traeger = el.closest(".buehnen-kachel, .auftrag-karte");
    if (traeger){
      const warnKlasse = traeger.classList.contains("buehnen-kachel") ? "eskalation" : "warnung";
      traeger.classList.toggle(warnKlasse, lage !== "ok");
    }
  });
}
setInterval(tick, 1000);

/* Start */
rendern();
tick();

/* ============================================================
   GETROFFENE ANNAHMEN (Prototyp)
   ------------------------------------------------------------
   1. Meister/Leitung nutzt die Annahme-Ansicht mit Vollzugriff
      (inkl. Auswertung, Storno, Status-Reset, Preise); eine
      eigene vierte Ansicht war in der Spezifikation nicht
      vorgesehen ("drei Ansichten").
   2. Termin-Ampel: "knapp" = weniger als 45 Minuten bis zur
      Zusagezeit, "überfällig" = Zusagezeit überschritten. Die
      geschätzte Restdauer je Auftrag wird im Prototyp nicht
      separat gepflegt – die Ampel vergleicht Zusagezeit mit
      der aktuellen Uhrzeit.
   3. Teile-Warnung: fest 2 Tage nach Bestellung ohne Eingang
      (Spezifikation: "X Tage, mit Betrieb festlegen").
   4. SMS-Wortlaut ist eine gekennzeichnete Platzhalter-Vorlage
      (Anrede "Sie", ohne Preis) – exakter Text laut Abschnitt 7
      mit dem Betrieb abzustimmen. Versand ist simuliert
      (sichtbare Nachricht + Log-Eintrag), Kanal-Fallback E-Mail
      nach erfolglosem Versuch.
   5. Rechte werden über die Ansichten simuliert: Mechaniker-
      Ansicht zeigt keine Preise und bietet kein Storno; echte
      Anmeldung/Benutzerverwaltung ist Sache der Vollversion.
   6. Fotos sind farbige Platzhalter mit Motiv + Uhrzeit
      (Vorher/Nachher getrennt), keine echte Kamera-Anbindung.
   7. Statuskette vorwärts: Wartet → In Arbeit → Probefahrt →
      Fertig → Abgeholt; jeder Status ist über die Annahme frei
      zurücksetzbar (Fehlbedienung), jede Änderung steht mit
      Uhrzeit und Person im Log.
   8. "Geparkt" blockiert keine Bühne (Bühne wird freigegeben),
      der Standort wird als Notiz angezeigt.
   9. Auslastung "im Tagesverlauf" und Wochen-Durchsatz sind nur
      angedeutet, da der Prototyp lediglich einen Demo-Tag im
      Arbeitsspeicher hält.
  10. Einstellbarkeit: Betriebsname, SMS-Vorlage (Platzhalter
      {name}/{kennzeichen}/{zeit}/{werkstatt}), Warnschwellen,
      Bühnen, Mechaniker und Auftragsarten samt Checklisten sind
      über das Zahnrad (⚙) frei anpassbar; ein Hilfe-Symbol (?)
      oben rechts erklärt das gesamte Board. Wie alle Daten
      liegen auch Einstellungen nur im Arbeitsspeicher
      (kein localStorage laut Vorgabe) - Neuladen setzt zurück.

   5 AUSBAU-IDEEN FÜR VERSION 2
   ------------------------------------------------------------
   1. Echter SMS-/E-Mail-Versand (z. B. Gateway-Anbindung) mit
      Vorlagenverwaltung (Du/Sie, Preis, Abholzeit) und
      Zustellstatus je Kunde.
   2. Anbindung an DMS/Warenwirtschaft/Kasse: Teilebestellung
      direkt beim Lieferanten, automatischer Wareneingang,
      Rechnungsübergabe.
   3. Terminkalender mit Kapazitätsplanung: Bühnen-Belegung im
      Tagesverlauf, Spezialisierungen (z. B. Achsvermessung),
      Online-Terminbuchung für Kunden.
   4. Echte Foto-Aufnahme per Gerätekamera mit rechtssicherer,
      revisionsfester Ablage (Zeitstempel, Aufbewahrungsfristen)
      für Gewährleistungsfälle.
   5. Kunden-Statusseite per QR-Code/Link ("Wo steht mein
      Auto?") – entlastet das Telefon zusätzlich; plus
      Wochen-/Monats-Auswertungen mit Termintreue-Trend.
   ============================================================ */
</script>
